# Layer2 trainingconfigfile

# modelconfig
mol_emb_dim: 256
hidden_dim: 512
n_layers: 6
n_heads: 8
dropout: 0.1
num_roles: 11
num_token_types: 2
tau: 0.07
learnable_tau: false
symmetric_ince: false

# trainingconfig
data_path: "${SCICORE_ROOT:-/path/to/scicore-mol}/Layer2/data/train.jsonl" # trainingdatapathdefault
use_indexed_dataset: false # whetheruse IndexedDatasetneedsbuildindex
batch_size: 32
num_workers: 4
learning_rate: 1e-4
weight_decay: 0.01
num_epochs: 10
save_steps: 1000
log_steps: 100

# Loss weight
emb_lambda: 1.0
amt_lambda: 1.0
yield_weight: 1.0
yield_reg_lambda: 1.0
yield_mode: "both" # "reg_only", "bin_only", "soft_bin_only", "both"

# Masking config
emb_mask_prob: 0.15
amt_mask_prob: 0.15

#
tf32: true
global_seed: 42
results_dir: "${CHECKPOINT_DIR:-/path/to/checkpoints}/layer2_training" # trainingoutputdirectorydefault
