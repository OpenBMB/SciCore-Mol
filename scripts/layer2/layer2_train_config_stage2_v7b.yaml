# Layer2 Stage 2 (v7b - bin_only + 3-layer unfreeze)
#
# v6 was best (bin_only, 2 layers, yield_acc=0.416)
# v7 soft_bin peaked at 0.32 (worse exact accuracy)
# v7b: keep bin_only but unfreeze 3 layers + lower backbone_lr
# Also try: longer training, higher yield_weight

mol_emb_dim: 256
hidden_dim: 768
n_layers: 8
n_heads: 12
dropout: 0.2
num_roles: 11
num_token_types: 2
tau: 0.07
learnable_tau: true
symmetric_ince: true
use_projection_head: true
head_dropout: 0.2

# data
data_path: "${SCICORE_ROOT:-/path/to/scicore-mol}/Layer2/data/ord_layer2_v2/layer2_train.jsonl"
val_data_path: "${SCICORE_ROOT:-/path/to/scicore-mol}/Layer2/data/ord_layer2_v2/layer2_val.jsonl"
use_indexed_dataset: true

# training
batch_size: 64
weight_decay: 0.05
num_epochs: 500
warmup_steps: 300
min_lr: 0.000001
grad_accumulation_steps: 2
save_steps: 600
eval_steps: 200
log_steps: 50
num_workers: 4

# Phase A
freeze_backbone: true
head_lr: 0.002
yield_label_smoothing: 0.0
phase_b_step: 2000

# Phase B: unfreeze 3 layers (vs v6's 2)
unfreeze_top_layers: 3
backbone_lr: 0.00003
phase_b_head_lr: 0.0004
phase_b_warmup: 300
phase_b_label_smoothing: 0.1

# EMA
ema_decay: 0.999

# Selection
best_selection: "composite"
composite_alpha: 0.3

patience: 80

use_amp: true

# Loss
emb_lambda: 1.0
amt_lambda: 0.3
yield_weight: 6.0
yield_mode: "bin_only"
yield_class_weights: true

# Masking (yield-heavy)
p_forward: 0.15
p_retro: 0.10
p_condition: 0.05
p_random: 0.05
p_yield_full: 0.35
p_yield_with_product: 0.30

resume_from: "${SCICORE_ROOT:-/path/to/scicore-mol}/Layer2/ckpt/0115/layer2_pretrain.pt"

tf32: true
global_seed: 42
results_dir: "${CHECKPOINT_DIR:-/path/to/checkpoints}/layer2_stage2"
