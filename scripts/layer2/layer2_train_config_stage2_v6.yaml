# Layer2 Stage 2 trainingconfig (v6 - Bin-Only Classification)
#
# Key changes from v5:
# 1. yield_mode: "bin_only" (drop regression head entirely)
# 2. Higher yield_weight (5.0) since no regression to share gradient
# 3. Increased yield task sampling (60% of tasks involve yield)
# 4. Longer Phase A (2000 steps) for better head warmup
# 5. yield_class_weights: true (handle imbalanced bins)
# 6. Stronger label smoothing in Phase B (0.15)
#
# Two-Phase Training (same structure as v5):
# Phase A (step 0 → 2000): Frozen backbone, head warmup
# Phase B (step 2000+): Unfreeze top 2 layers + EMA
#
# Best model selection: composite = yield_bin_acc + 0.3 * emb_top1

# modelconfig (must match Stage 1 checkpoint)
mol_emb_dim: 256
hidden_dim: 768
n_layers: 8
n_heads: 12
dropout: 0.2
num_roles: 11
num_token_types: 2
tau: 0.07
learnable_tau: true
symmetric_ince: true
use_projection_head: true

# Head dropout
head_dropout: 0.15

# dataconfig
data_path: "${SCICORE_ROOT:-/path/to/scicore-mol}/Layer2/data/ord_layer2_v2/layer2_train.jsonl"
val_data_path: "${SCICORE_ROOT:-/path/to/scicore-mol}/Layer2/data/ord_layer2_v2/layer2_val.jsonl"
use_indexed_dataset: true

# trainingconfig
batch_size: 64
weight_decay: 0.05
num_epochs: 500
warmup_steps: 300
min_lr: 0.000001
grad_accumulation_steps: 2
save_steps: 600
eval_steps: 200
log_steps: 50
num_workers: 4

# ===== Two-Phase Strategy =====
freeze_backbone: true

# Phase A: frozen backbone, heads-only warmup (longer than v5)
head_lr: 0.002
yield_label_smoothing: 0.0

# Phase transition (later than v5: 2000 vs 1500)
phase_b_step: 2000

# Phase B: partial unfreeze
unfreeze_top_layers: 2
backbone_lr: 0.00005
phase_b_head_lr: 0.0005
phase_b_warmup: 200
phase_b_label_smoothing: 0.15

# EMA: deferred to Phase B
ema_decay: 0.999

# Best model selection
best_selection: "composite"
composite_alpha: 0.3

# Early stopping (generous)
patience: 60

# AMP
use_amp: true

# Loss weight
emb_lambda: 1.0
amt_lambda: 0.3
yield_weight: 5.0
yield_mode: "bin_only"
yield_class_weights: true

# Masking (yield-heavy: 60% yield tasks)
p_forward: 0.15
p_retro: 0.10
p_condition: 0.05
p_random: 0.05
p_yield_full: 0.35
p_yield_with_product: 0.30

# Resume from Stage 1
resume_from: "${SCICORE_ROOT:-/path/to/scicore-mol}/Layer2/ckpt/0115/layer2_pretrain.pt"

#
tf32: true
global_seed: 42
results_dir: "${CHECKPOINT_DIR:-/path/to/checkpoints}/layer2_stage2"
