# LLM CPT+SFT model evaluation config
model_type: llm
model_name: llm_cpt_sft

# model pathuse llm directorycontains LLM weight
ckpt: ${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/LLM_nofreeze/checkpoint-4200/llm

# input datatest_text2smi.jsonl format
input_data: ${SCICORE_ROOT:-/path/to/scicore-mol}/eval_results/data/ldmol/drug_optim/processed/test_text2smi.jsonl

# inference algorithm
algorithm: chat

# device config: "auto" / "cuda:0" / "0" / "0,1,2"multi-GPU
device: 6,7

# inference
batch_size: 8

# Qwen3 modetrue=output
enable_thinking: false

# whetheroutputcontains
include_thinking: false

# generateparametermodeneeds max_new_tokens
max_new_tokens: 256
temperature: 0.7
do_sample: true
