# LLM Base model evaluation config
model_type: llm
model_name: llm_base

# model path
ckpt: ${DATA_DIR:-/path/to/data}/base_model/qwen3_8b

# input datatest_text2smi.jsonl format
input_data: ${SCICORE_ROOT:-/path/to/scicore-mol}/eval_results/data/ldmol/drug_optim/processed/test_text2smi.jsonl

# inference algorithm
algorithm: chat

# device config: "auto" / "cuda:0" / "0" / "0,1,2"multi-GPU
device: 6,7

# inference
batch_size: 8

# Qwen3 modetrue=output
enable_thinking: false

# whetheroutputcontains
include_thinking: false

# generateparameter
max_new_tokens: 256
temperature: 0.7
do_sample: true
