# Diffusion Base model evaluation config
model_type: diffusion
model_name: diffusion_base

# model path
ckpt: ${CHECKPOINT_DIR:-/path/to/checkpoints}/diffusion_pretrained/ours/ldmol/ldmol_chatmol.pt

# input data（test_dds.txt format）
input_data: ${SCICORE_ROOT:-/path/to/scicore-mol}/eval_results/data/ldmol/drug_optim/processed/test_dds.txt

# inference algorithm
algorithm: dds

# device config: "cuda:0" / "0"（Diffusion single GPU only）
device: 5

# LDMol config file (optional, defaults to ldmol_config.yaml）
ldmol_config: null
