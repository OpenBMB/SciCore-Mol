seed: 42

paths:
  llm_name_or_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/LLM_nofreeze/checkpoint-4200/llm"
  output_dir: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/LLM_nofreeze_20260128"
  gnn_state_dict_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/LLM_nofreeze/checkpoint-4200"
  gnn_mlp_state_dict_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/LLM_nofreeze/checkpoint-4200"
  mlp_token_classifier_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_mlp_token_head.pt"
  deepspeed_config: "configs/deepspeed_zero3.json"
  # NOTE: paths.checkpoint_dir must be manually set to the actual checkpoint-XXXX directory after epoch1
  # e.g.: ${DATA_DIR:-/path/to/data}/MSMLM/model/mistral_cpt_sft_twoepoch/epoch1/checkpoint-XXX
  checkpoint_dir: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/LLM_nofreeze/checkpoint-4200"

tokens:
  mol_token: "<mol>"

data:
  dataset_path: "${DATA_DIR:-/path/to/data}/train_data/SFT_DATA/chat_data_msg/sft_2.5_to_1_30k_balanced.jsonl"
  epoch1_output: "${DATA_DIR:-/path/to/data}/train_data/SFT_DATA/chat_data_msg/sft_2.5_to_1_30k_balanced.jsonl"
  epoch2_output: "${DATA_DIR:-/path/to/data}/train_data/SFT_DATA/chat_data_msg/sft_2.5_to_1_30k_balanced.jsonl"
  qm9_stats_file: null
  epoch1_qm9_max_samples: null
  use_cache: true
  debug_max_samples: null

train:
  # pure SFT, train LLM only
  use_gnn_tasks: false
  lambda_gnn: 0.0

  max_seq_length: 2048
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1e-5
  num_train_epochs: 1
  logging_steps: 10
  save_steps: 200
  eval_steps: 50
  warmup_ratio: 0.03
  bf16: true
  gradient_checkpointing: true
  packing: false
  dataloader_pin_memory: false  # set to false to avoid memory mapping issues
  lr_scheduler_type: "cosine"
  max_retries: 3
  retry_backoff_sec: 30
  save_total_limit: 2

  use_preprocess_cache: true
  dataloader_num_workers: 8
  dataloader_prefetch_factor: 2

  max_grad_norm: 1.0
  weight_decay: 0.01

  use_diffusion: false

  use_offline_spans: false
  offline_tagging_batch_size: 128

  # freeze strategy: only train LLM, GVP / mol_adapter frozen
  freeze_llm: false
  freeze_gnn: false
  freeze_mol_adapter: false
  freeze_diffusion_adapter: true
  freeze_diffusion: true

network:
  proxy: "http://127.0.0.1:7899"


