seed: 42

paths:
  llm_name_or_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3-8b-cpt/v4-20251208-164944/checkpoint-14000"
  output_dir: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/GNN_nofreeze_20260128"
  gnn_state_dict_path: "${GVP_CHECKPOINT:-/path/to/gvp_weights.pt}"
  gnn_mlp_state_dict_path: "${DATA_DIR:-/path/to/data}/MSMLM/model/gnn_mlp_qwen/mlp_adapter.pt"
  mlp_token_classifier_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_mlp_token_head.pt"
  deepspeed_config: "configs/deepspeed_zero3.json"

tokens:
  mol_token: "<mol>"

data:
  dataset_path: "${DATA_DIR:-/path/to/data}/MSMLM/code/data/epoch1_preprocessed_qwen_test.jsonl"
  epoch1_output: "${DATA_DIR:-/path/to/data}/MSMLM/code/data/epoch1_preprocessed_qwen_test.jsonl"
  epoch2_output: "${DATA_DIR:-/path/to/data}/MSMLM/code/data/epoch1_preprocessed_qwen_test.jsonl"
  qm9_stats_file: ${DATA_DIR:-/path/to/data}/MSMLM/code/data/epoch1_preprocessed_qm9_stats.json
  epoch1_qm9_max_samples: null
  use_cache: true
  debug_max_samples: null


train:
  # LM loss only, no GNN supervised loss
  use_gnn_tasks: false
  lambda_gnn: 0.0

  max_seq_length: 4096
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 16
  learning_rate: 2e-5
  num_train_epochs: 1
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
  warmup_ratio: 0.03
  bf16: true
  gradient_checkpointing: true
  packing: false
  dataloader_pin_memory: false  # set to false to avoid memory mapping issues
  lr_scheduler_type: "cosine"
  max_retries: 3
  retry_backoff_sec: 30
  save_total_limit: 3

  use_preprocess_cache: false
  dataloader_num_workers: 4
  dataloader_prefetch_factor: 2

  max_grad_norm: 1.0
  weight_decay: 0.01

  use_diffusion: false

  use_offline_spans: false
  offline_tagging_batch_size: 128

  # freeze strategy: LLM frozen, GVP + mol_adapter trainable
  freeze_llm: true
  freeze_gnn: false
  freeze_mol_adapter: false
  freeze_diffusion_adapter: true
  freeze_diffusion: true

network:
  proxy: "http://127.0.0.1:7899"


