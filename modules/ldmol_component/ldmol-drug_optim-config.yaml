# -----------------------------------------------------------------------------
# dataconfig
# -----------------------------------------------------------------------------
data:
 data_paths: [ 
 "${SCICORE_ROOT:-/path/to/scicore-mol}/eval_results/data/ldmol/drug_optim/processed/train_mol_edit.txt"
 ] # datapathsupports .txt .csv
 max_smiles_len: 350 # SMILES maxlength

# -----------------------------------------------------------------------------
# DiT modelconfig
# -----------------------------------------------------------------------------
dit:
 name: "LDMol" # DiT model DiT_models 
 ckpt: "${CHECKPOINT_DIR:-/path/to/checkpoints}/diffusion_pretrained/ours/ldmol/ldmol_chatmol-qwen3_8b.pt"
 latent_size: 127 # Autoencoder latent length
 in_channels: 64 # latent 
 cross_attn_dim: 768 # cross attention dimension
 condition_dim: 2048 # conditionembeddingdimension

# -----------------------------------------------------------------------------
# SMILES Encoder config
# -----------------------------------------------------------------------------
smiles_encoder:
 name: "autoencoder" 
 ckpt: "${CHECKPOINT_DIR:-/path/to/checkpoints}/diffusion_pretrained/official/checkpoint_autoencoder.ckpt"
 

# -----------------------------------------------------------------------------
# Text Encoder config
# -----------------------------------------------------------------------------
text_encoder:
 name: "qwen3_8b" # Text Encoder typesupports qwen3_8b
 ckpt: "${CHECKPOINT_DIR:-/path/to/checkpoints}/qwen3_8b_cpt_sft/epoch2/LLM_nofreeze/checkpoint-4200/llm" # Text Encoder trainingweightpath
 hidden_dim: 4096 
 description_length: 256 
