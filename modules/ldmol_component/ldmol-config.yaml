# ====================================================================
# LDMol inferenceconfigfile
# ====================================================================

# ----- config -----
tf32: true # TF32 Ampere GPU

# ----- DiT modelconfig -----
dit_name: "LDMol" # DiT model
ldmol_ckpt_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/diffusion_pretrained/ours/ldmol/ldmol_chatmol-qwen3_8b.pt"

# ----- Text Encoder config -----
# supports qwentype AssertionError
text_encoder_name: "qwen" # encodertype: qwen
text_encoder_path: "${DATA_DIR:-/path/to/data}/base_model/qwen3_8b" # model path
llm_hidden_dim: 4096 # Qwen3_8B hiddenlayerdimension
condition_dim: 2048 # conditiondimension
description_length: 512 # max token length

# ----- Autoencoder (VAE) config -----
vae_ckpt_path: "${CHECKPOINT_DIR:-/path/to/checkpoints}/diffusion_pretrained/official/checkpoint_autoencoder.ckpt"
ae_embed_dim: 256 # Autoencoder embeddingdimension
ae_use_linear: true # whetheruselayer

# ----- T2M (Text-to-Molecule) sampleconfig -----
num_sampling_steps: 100 # samplestep
cfg_scale: 2.5 # Classifier-Free Guidance 
prompt_null: "no description." # CFG null condition 

# ----- DDS (Diffusion-based Drug Steering) config -----
dds_loss_scale: 0.4 # gradientupdate
dds_n_iter: 200 # optimizationiterate
dds_cfg_scale: 2.0 # DDS CFG 
dds_t_min: 100 # sample
dds_t_max: 900 # sample
